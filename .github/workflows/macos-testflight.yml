name: macOS TestFlight

# Builds the native macOS app (Swift/AppKit) and uploads it to TestFlight.
# Manual trigger only — run it when you want a new beta build.
#
# Required repo secrets (see macos/RELEASING.md for how to obtain each):
#   APPLE_TEAM_ID                      Your 10-char Developer Team ID
#   BUILD_CERTIFICATE_BASE64           base64 of the "Apple Distribution" cert (.p12)
#   P12_PASSWORD                       password for that .p12
#   KEYCHAIN_PASSWORD                  any throwaway password for the temp keychain
#   APP_STORE_CONNECT_KEY_ID           App Store Connect API key ID
#   APP_STORE_CONNECT_ISSUER_ID        App Store Connect API issuer ID
#   APP_STORE_CONNECT_API_KEY_BASE64   base64 of the API key (.p8)

on:
  workflow_dispatch:
    inputs:
      marketing_version:
        description: "Marketing version (CFBundleShortVersionString). Blank = use VERSION file."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: macos-testflight
  cancel-in-progress: false

jobs:
  testflight:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: macos
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Self-tests (gate)
        run: swift run ctailmac --selftest

      - name: Import signing certificate into a temporary keychain
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          CERT="$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o "$CERT"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN" >/dev/null

      - name: Write App Store Connect API key
        env:
          API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/keys"
          echo -n "$API_KEY_BASE64" | base64 --decode -o "$RUNNER_TEMP/keys/AuthKey.p8"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Archive
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          VERSION="${{ inputs.marketing_version }}"
          [ -z "$VERSION" ] && VERSION="$(cat ../VERSION 2>/dev/null || echo 1.0.0)"
          echo "Building $VERSION (build ${{ github.run_number }})"
          xcodebuild -project ctail.xcodeproj -scheme ctail -configuration Release \
            -archivePath "$RUNNER_TEMP/ctail.xcarchive" \
            -authenticationKeyPath "$RUNNER_TEMP/keys/AuthKey.p8" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            MARKETING_VERSION="$VERSION" \
            CURRENT_PROJECT_VERSION="${{ github.run_number }}" \
            clean archive

      - name: Export & upload to TestFlight
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>destination</key><string>upload</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>${TEAM_ID}</string>
          </dict>
          </plist>
          PLIST
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/ctail.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -exportPath "$RUNNER_TEMP/export" \
            -authenticationKeyPath "$RUNNER_TEMP/keys/AuthKey.p8" \
            -authenticationKeyID "$KEY_ID" \
            -authenticationKeyIssuerID "$ISSUER_ID" \
            -allowProvisioningUpdates

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/app-signing.keychain-db" || true
